<!DOCTYPE html>
<html lang="en" class="bg-[#0b0b0b] text-[#f4f0e8] min-h-screen">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The OG Barber – Premium Grooming</title>

  <link rel="icon" href="https://i.imgur.com/4dIWLpI.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="https://i.imgur.com/4dIWLpI.jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-dark': '#0b0b0b',
            'bg-card': '#111111',
            'gold': '#c9a347',
            'gold-light': '#e0c070',
            'gold-dark': '#a67c00',
            'text-light': '#f4f0e8',
            'text-dim': '#c4b9a8',
            'border-gold': 'rgba(201,163,71,0.22)',
            'error-red': '#c94a4a',
            'success-green': '#4caf50',
            'bg-light': '#f8f5f0',
            'text-dark': '#1a140f',
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'gold': '0 10px 38px rgba(201,163,71,0.14)',
            'heavy': '0 16px 60px rgba(0,0,0,0.65)',
          }
        }
      }
    }
  </script>

  <style>
    .toast {
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      animation: fadeIn 0.4s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    html.light {
      --tw-bg-opacity: 1;
      background-color: rgb(248 245 240 / var(--tw-bg-opacity));
      color: #1a140f;
    }
    html.light .bg-bg-dark { background-color: #f8f5f0; }
    html.light .bg-bg-card { background-color: white; }
    html.light .text-text-light { color: #1a140f; }
    html.light .text-text-dim { color: #5c4b3a; }
    html.light .border-border-gold { border-color: rgba(201,163,71,0.4); }
    html.light .bg-gold { background-color: #c9a347; color: #0b0b0b; }
    html.light input, html.light textarea {
      background-color: #fff;
      border-color: #d1c7b0;
      color: #1a140f;
    }

    #times > div.past-time {
      opacity: 0.5;
      background-color: rgba(30,30,30,0.6) !important;
      border-color: #444 !important;
      color: #888 !important;
      cursor: not-allowed !important;
      text-decoration: line-through;
    }

    #times > div.past-time:hover {
      background-color: rgba(30,30,30,0.6) !important;
      border-color: #444 !important;
      transform: none;
    }

    #times > div.booked {
      background-color: rgba(127,29,29,0.25) !important;
      border-color: #7f1d1d !important;
      color: #fda4af !important;
      cursor: not-allowed !important;
    }

    input[type="checkbox"].remember-me {
      appearance: none;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #c9a347;
      border-radius: 0.25rem;
      background: #1a1a1a;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    input[type="checkbox"].remember-me:checked {
      background: #c9a347;
      border-color: #c9a347;
    }

    input[type="checkbox"].remember-me:checked::after {
      content: '✔';
      position: absolute;
      inset: 0;
      color: #0b0b0b;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    input[type="checkbox"].remember-me:hover {
      border-color: #e0c070;
    }

    /* Enhanced touch targets */
    button, input[type="checkbox"], .nav-btn {
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }

    /* Prevent zoom on inputs for iOS */
    input, textarea {
      font-size: 16px;
    }
  </style>
</head>
<body class="font-sans bg-bg-dark text-text-light min-h-screen antialiased">

  <!-- Header with logo -->
  <header class="bg-gradient-to-b from-bg-dark to-[#0f0f0f] py-6 md:py-10 px-6 text-center border-b border-border-gold shadow-heavy relative">
    <button id="backBtn" onclick="goBack()" class="absolute left-6 top-6 md:top-8 hidden border border-gold text-gold px-4 py-2 font-medium transition-all hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_22px_rgba(201,163,71,0.4)]">
      ← Back
    </button>

    <div onclick="goHome()" class="cursor-pointer inline-block">
      <img 
        src="https://i.imgur.com/4dIWLpI.jpeg" 
        alt="The OG Barber Logo" 
        class="mx-auto h-16 md:h-24 lg:h-28 w-auto object-contain drop-shadow-[0_6px_24px_rgba(201,163,71,0.5)] transition-transform hover:scale-105"
      >
    </div>
  </header>

  <!-- Navigation -->
  <nav class="bg-[#0a0a0a] py-5 border-b border-border-gold text-center flex flex-col md:flex-row justify-center gap-4 md:gap-12">
    <button onclick="showBooking()" class="nav-btn px-8 py-3 text-lg font-medium text-text-dim hover:text-gold transition-colors relative after:absolute after:bottom-[-6px] after:left-1/2 after:-translate-x-1/2 after:w-0 after:h-0.5 after:bg-gold after:transition-all hover:after:w-2/5 data-[active=true]:text-gold data-[active=true]:after:w-2/5">
      Book Now
    </button>
    <button onclick="showProducts()" class="nav-btn px-8 py-3 text-lg font-medium text-text-dim hover:text-gold transition-colors relative after:absolute after:bottom-[-6px] after:left-1/2 after:-translate-x-1/2 after:w-0 after:h-0.5 after:bg-gold after:transition-all hover:after:w-2/5">
      Shop
    </button>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[10000] max-w-xs md:max-w-sm space-y-3"></div>

  <!-- Mode Toggle -->
  <button onclick="toggleMode()" class="fixed bottom-8 right-20 md:right-8 z-50 w-14 h-14 rounded-full bg-gold/10 border border-gold text-gold flex items-center justify-center text-2xl shadow-gold hover:bg-gold hover:text-bg-dark hover:scale-110 transition-all">
    <span class="dark:hidden">☀</span>
    <span class="hidden dark:inline">☽</span>
  </button>

  <!-- Auth Section -->
  <div id="authSection" class="container max-w-3xl mx-auto px-6 py-12">
    <div id="signupCard" class="bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold">
      <h2 class="text-4xl font-serif text-gold mb-8">Create Your Account</h2>
      <input id="signupEmail" type="email" placeholder="Email address" class="w-full p-4 mb-5 bg-[#1a1a1a] border border-border-gold rounded-lg text-text-light focus:border-gold-light focus:ring-2 focus:ring-gold/30 outline-none" required aria-label="Email address">
      <input id="signupUsername" type="text" placeholder="Username" class="w-full p-4 mb-6 bg-[#1a1a1a] border border-border-gold rounded-lg text-text-light focus:border-gold-light focus:ring-2 focus:ring-gold/30 outline-none" required aria-label="Username">
      <button onclick="signup()" class="w-full py-4 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all disabled:opacity-50 disabled:cursor-not-allowed" id="signupBtn">
        Sign Up
      </button>
      <p class="text-center mt-6 text-text-dim">Already a member? <a href="#" onclick="showLogin(); event.preventDefault();" class="text-gold hover:underline">Sign in</a></p>
    </div>

    <div id="loginCard" class="hidden bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold">
      <h2 class="text-4xl font-serif text-gold mb-8">Welcome Back</h2>
      <input id="loginEmail" type="email" placeholder="Email address" class="w-full p-4 mb-4 bg-[#1a1a1a] border border-border-gold rounded-lg text-text-light focus:border-gold-light focus:ring-2 focus:ring-gold/30 outline-none" required aria-label="Email address">

      <div class="flex items-center mb-6">
        <input type="checkbox" id="rememberMe" class="remember-me">
        <label for="rememberMe" class="ml-3 text-text-dim cursor-pointer hover:text-gold-light transition">
          Remember me for 30 days
        </label>
      </div>

      <button onclick="login()" class="w-full py-4 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all disabled:opacity-50 disabled:cursor-not-allowed" id="loginBtn">
        Sign In
      </button>
      <p class="text-center mt-6 text-text-dim">New here? <a href="#" onclick="showSignup(); event.preventDefault();" class="text-gold hover:underline">Create account</a></p>
    </div>
  </div>

  <!-- Booking Section -->
  <div id="bookingSection" class="hidden container max-w-5xl mx-auto px-6 py-12">
    <div id="step1" class="bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold">
      <h2 class="text-4xl font-serif text-gold mb-8">Select Services</h2>
      <input id="customerName" placeholder="Name for the booking (optional)" class="w-full p-4 mb-6 bg-[#1a1a1a] border border-border-gold rounded-lg text-text-light focus:border-gold-light focus:ring-2 focus:ring-gold/30 outline-none" aria-label="Name for the booking">

      <div id="services" class="space-y-5 mb-8"></div>
      <div class="text-center text-2xl font-bold text-gold-light mb-6">
        Total: £<span id="total">0.00</span>
      </div>
      <button onclick="goToCalendar()" class="w-full py-4 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all" id="continueToDateBtn">
        Continue to Date
      </button>
    </div>

    <div id="step2" class="hidden bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold">
      <h2 class="text-4xl font-serif text-gold mb-8">Choose Date</h2>
      <div id="calendar" class="grid grid-cols-3 md:grid-cols-7 gap-4"></div>
      <button onclick="goToTimes()" class="mt-8 w-full py-4 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all" id="continueToTimeBtn">
        Continue to Time
      </button>
    </div>

    <div id="step3" class="hidden bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold">
      <h2 class="text-4xl font-serif text-gold mb-8">Choose Time</h2>
      <div id="times" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
      <button onclick="confirmBooking()" class="mt-8 w-full py-4 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all disabled:opacity-50 disabled:cursor-not-allowed" id="confirmBookingBtn">
        Confirm Booking
      </button>
    </div>

    <div id="step4" class="hidden bg-bg-card border border-border-gold rounded-2xl p-10 shadow-gold text-center">
      <h2 class="text-4xl font-serif text-gold mb-6">Booking Confirmed</h2>
      <p id="confirmationText" class="text-xl mb-8 leading-relaxed whitespace-pre-line"></p>
      <button onclick="startNewBooking()" class="py-4 px-10 bg-transparent border-2 border-gold text-gold font-semibold rounded-lg hover:bg-gold hover:text-bg-dark hover:shadow-[0_0_28px_rgba(201,163,71,0.45)] transition-all" id="bookAnotherBtn">
        Book Another Appointment
      </button>
    </div>
  </div>

  <!-- Products Section -->
  <div id="productsSection" class="hidden container max-w-6xl mx-auto px-6 py-12">
    <h2 class="text-5xl font-serif text-gold text-center mb-12">Premium Products</h2>
    <div class="mt-20 py-24 text-center">
      <div class="inline-block p-10 md:p-16 rounded-3xl bg-bg-card/70 border border-border-gold/60 shadow-gold">
        <h3 class="text-5xl md:text-6xl font-serif text-gold mb-6 tracking-wide">Coming Soon</h3>
        <p class="text-xl md:text-2xl text-text-dim max-w-2xl mx-auto leading-relaxed">
          Our premium grooming products are being carefully curated.<br>
          Stay tuned — launching very soon!
        </p>
      </div>
    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────────────────────────────────────
    // EARLY DEBUG + TOAST (runs first)
    // ──────────────────────────────────────────────────────────────────────────────
    console.log("=== FULL INDEX.HTML LOADED ===");

    function showToast(message, type = 'info') {
      console.log(`[TOAST] ${type}: ${message}`);
      const container = document.getElementById('toast-container');
      if (!container) return console.error("Toast container missing");
      const toast = document.createElement('div');
      toast.className = `p-5 rounded-xl shadow-2xl text-white font-medium ${
        type === 'success' ? 'bg-green-700' : type === 'error' ? 'bg-red-700' : 'bg-blue-700'
      }`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 7000);
    }

    showToast("Full page loaded – calendar & bookings restored", 'success');

    // ──────────────────────────────────────────────────────────────────────────────
    // GLOBAL STATE
    // ──────────────────────────────────────────────────────────────────────────────
    let currentUser = null;
    let currentStep = 1;
    let selectedServices = [];
    let total = 0;
    let selectedDate = "";
    let selectedTime = "";

    const BACKEND = "http://192.168.0.8:3000";

    // ──────────────────────────────────────────────────────────────────────────────
    // AUTH FUNCTIONS
    // ──────────────────────────────────────────────────────────────────────────────
    function showSignup() {
      try {
        document.getElementById("signupCard").classList.remove("hidden");
        document.getElementById("loginCard").classList.add("hidden");
      } catch (e) {
        showToast("Cannot show signup form", 'error');
      }
    }

    function showLogin() {
      try {
        document.getElementById("signupCard").classList.add("hidden");
        document.getElementById("loginCard").classList.remove("hidden");
      } catch (e) {
        showToast("Cannot show login form", 'error');
      }
    }

    async function signup() {
      console.log("signup() called");
      const signupBtn = document.getElementById("signupBtn");
      signupBtn.disabled = true;
      showToast("Signing up...", 'info');

      try {
        const email = document.getElementById("signupEmail")?.value?.trim() || "";
        const username = document.getElementById("signupUsername")?.value?.trim() || "";

        if (!email || !username) {
          showToast("Please fill in email and username", 'error');
          return;
        }

        if (!/\S+@\S+\.\S+/.test(email)) {
          showToast("Invalid email format", 'error');
          return;
        }

        const res = await fetch(`${BACKEND}/user/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, username })
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({ message: `Server error ${res.status}` }));
          throw new Error(errorData.message || `Server error ${res.status}`);
        }

        const data = await res.json();
        currentUser = data.user;
        showToast("Account created successfully!", 'success');
        document.getElementById("authSection").classList.add("hidden");
        document.getElementById("bookingSection").classList.remove("hidden");
      } catch (err) {
        console.error("Signup error:", err);
        showToast("Signup failed: " + err.message, 'error');
      } finally {
        signupBtn.disabled = false;
      }
    }

    async function login() {
      console.log("login() called");
      const loginBtn = document.getElementById("loginBtn");
      loginBtn.disabled = true;
      showToast("Logging in...", 'info');

      try {
        const email = document.getElementById("loginEmail")?.value?.trim() || "";
        if (!email) return showToast("Email is required", 'error');

        if (!/\S+@\S+\.\S+/.test(email)) {
          showToast("Invalid email format", 'error');
          return;
        }

        const res = await fetch(`${BACKEND}/user/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({ message: `Server error ${res.status}` }));
          throw new Error(errorData.message || `Server error ${res.status}`);
        }

        const data = await res.json();
        currentUser = data.user;

        if (document.getElementById("rememberMe").checked) {
          localStorage.setItem('rememberedEmail', email);
        } else {
          localStorage.removeItem('rememberedEmail');
        }

        showToast("Logged in successfully!", 'success');
        document.getElementById("authSection").classList.add("hidden");
        document.getElementById("bookingSection").classList.remove("hidden");
      } catch (err) {
        console.error("Login error:", err);
        showToast("Login failed: " + err.message, 'error');
      } finally {
        loginBtn.disabled = false;
      }
    }

    // ──────────────────────────────────────────────────────────────────────────────
    // SERVICES
    // ──────────────────────────────────────────────────────────────────────────────
    const servicesData = [
      { name: "Haircut",      price: 10    },
      { name: "Skin Fade",    price: 11.99 },
      { name: "Beard Trim",   price: 6.99  },
      { name: "Hair & Beard", price: 14.99 }
    ];

    function renderServices() {
      try {
        const container = document.getElementById("services");
        if (!container) throw new Error("Services container missing");
        container.innerHTML = "";
        servicesData.forEach(svc => {
          const div = document.createElement("div");
          div.className = "flex justify-between items-center py-3 border-b border-border-gold last:border-b-0";
          div.innerHTML = `
            <span class="text-lg">${svc.name}</span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" data-name="${svc.name}" data-price="${svc.price}">
              <div class="w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:bg-gold peer-checked:after:translate-x-7 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
            </label>
          `;
          div.querySelector("input").onchange = e => {
            const checked = e.target.checked;
            const name = e.target.dataset.name;
            const price = Number(e.target.dataset.price);
            if (checked) {
              if (!selectedServices.some(s => s.name === name)) {
                selectedServices.push({ name, price });
                total += price;
              }
            } else {
              selectedServices = selectedServices.filter(s => s.name !== name);
              total -= price;
            }
            document.getElementById("total").textContent = total.toFixed(2);
          };
          container.appendChild(div);
        });
      } catch (e) {
        console.error("renderServices failed:", e);
        showToast("Could not load services", 'error');
      }
    }

    // ──────────────────────────────────────────────────────────────────────────────
    // CALENDAR & TIME SLOTS
    // ──────────────────────────────────────────────────────────────────────────────
    const defaultTimes = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];

    function generateCalendar() {
      try {
        const container = document.getElementById("calendar");
        if (!container) throw new Error("Calendar container missing");
        container.innerHTML = "";
        const today = new Date();
        today.setHours(0,0,0,0);

        for (let i = 0; i < 21; i++) {
          const d = new Date();
          d.setDate(today.getDate() + i);
          const iso = d.toISOString().split("T")[0];

          const dayEl = document.createElement("div");
          dayEl.className = "text-center p-4 rounded-xl border border-border-gold cursor-pointer transition-all hover:border-gold hover:bg-gold/10";
          dayEl.innerHTML = `
            <div class="text-sm text-text-dim">${d.toLocaleDateString('en-GB', { weekday: 'short' })}</div>
            <div class="text-xl font-bold">${d.getDate()}</div>
            <div class="text-xs text-text-dim">${d.toLocaleDateString('en-GB', { month: 'short' })}</div>
          `;

          if (d < today) {
            dayEl.classList.add("opacity-40", "cursor-not-allowed", "bg-[#1a1a1a]");
            dayEl.setAttribute('aria-disabled', 'true');
          } else {
            dayEl.onclick = () => {
              document.querySelectorAll("#calendar > div").forEach(el => el.classList.remove("bg-gold", "text-bg-dark"));
              dayEl.classList.add("bg-gold", "text-bg-dark");
              selectedDate = iso;
              loadTimeSlots(iso);
            };
            dayEl.setAttribute('role', 'button');
            dayEl.setAttribute('tabindex', '0');
          }

          container.appendChild(dayEl);
        }
      } catch (e) {
        console.error("generateCalendar failed:", e);
        showToast("Calendar could not load", 'error');
      }
    }

    async function loadTimeSlots(date) {
      try {
        const container = document.getElementById("times");
        if (!container) throw new Error("Times container missing");
        container.innerHTML = "";
        selectedTime = "";

        // Fetch booked times from backend (assuming endpoint exists)
        let booked = [];
        try {
          const res = await fetch(`${BACKEND}/bookings?date=${date}`);
          if (res.ok) {
            const data = await res.json();
            booked = data.bookedTimes || [];
          }
        } catch (err) {
          console.warn("Failed to fetch booked times:", err);
        }

        const now = new Date();
        const isToday = date === now.toISOString().split("T")[0];

        defaultTimes.forEach(t => {
          const el = document.createElement("div");
          el.className = "text-center p-5 rounded-xl border border-border-gold cursor-pointer transition-all hover:border-gold hover:bg-gold/10";
          el.textContent = t;
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');

          let isPast = false;
          if (isToday) {
            const [hour, minute] = t.split(":").map(Number);
            const slotTime = new Date(now);
            slotTime.setHours(hour, minute, 0, 0);
            if (slotTime <= now) isPast = true;
          }

          if (booked.includes(t)) {
            el.classList.add("booked");
            el.title = "Already booked";
            el.setAttribute('aria-disabled', 'true');
          } else if (isPast) {
            el.classList.add("past-time");
            el.title = "Past time";
            el.setAttribute('aria-disabled', 'true');
          } else {
            el.onclick = () => {
              document.querySelectorAll("#times > div").forEach(e => e.classList.remove("bg-gold", "text-bg-dark"));
              el.classList.add("bg-gold", "text-bg-dark");
              selectedTime = t;
              showToast(`Time selected: ${t}`, 'success');
            };
          }

          container.appendChild(el);
        });
      } catch (e) {
        console.error("loadTimeSlots failed:", e);
        showToast("Could not load time slots", 'error');
      }
    }

    // ──────────────────────────────────────────────────────────────────────────────
    // BOOKING CONFIRMATION
    // ──────────────────────────────────────────────────────────────────────────────
    async function confirmBooking() {
      console.log("confirmBooking called");
      const confirmBtn = document.getElementById("confirmBookingBtn");
      confirmBtn.disabled = true;
      showToast("Confirming booking...", 'info');

      try {
        if (!currentUser) {
          showToast("Please sign in first", 'error');
          return;
        }

        const name = document.getElementById("customerName")?.value?.trim() || currentUser.username || "Guest";

        if (selectedServices.length === 0) return showToast("Select at least one service", 'error');
        if (!selectedDate) return showToast("Select a date", 'error');
        if (!selectedTime) return showToast("Select a time", 'error');

        const res = await fetch(`${BACKEND}/book`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            date: selectedDate,
            time: selectedTime,
            services: selectedServices,
            total: total.toFixed(2),
            email: currentUser.email || "guest@example.com"
          })
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({ message: "Booking failed" }));
          throw new Error(errorData.message || "Booking failed");
        }

        const data = await res.json();
        const servicesList = selectedServices.map(s => s.name).join(", ");
        const msg = `Thank you, ${name}!\n\nAppointment booked for:\n${selectedDate} at ${selectedTime}\n\nServices: ${servicesList}\nTotal: £${total.toFixed(2)}`;

        document.getElementById("confirmationText").textContent = msg;
        showToast("Booking confirmed!", 'success');

        document.querySelectorAll('[id^="step"]').forEach(el => el.classList.add("hidden"));
        document.getElementById("step4").classList.remove("hidden");
        document.getElementById("backBtn").style.display = "block";

        // Reset
        selectedServices = [];
        total = 0;
        selectedDate = "";
        selectedTime = "";
        document.getElementById("total").textContent = "0.00";
        document.querySelectorAll("#services input").forEach(cb => cb.checked = false);
        generateCalendar();
      } catch (err) {
        console.error("Booking error:", err);
        showToast("Booking failed: " + err.message, 'error');
      } finally {
        confirmBtn.disabled = false;
      }
    }

    // ──────────────────────────────────────────────────────────────────────────────
    // STEP NAVIGATION
    // ──────────────────────────────────────────────────────────────────────────────
    function showStep(n) {
      try {
        document.querySelectorAll('[id^="step"]').forEach(el => el.classList.add("hidden"));
        document.getElementById(`step${n}`).classList.remove("hidden");
        currentStep = n;
        document.getElementById("backBtn").style.display = n === 1 ? "none" : "block";
      } catch (e) {
        showToast("Navigation error", 'error');
      }
    }

    function goBack() {
      if (currentStep > 1) showStep(currentStep - 1);
    }

    function goHome() {
      showStep(1);
    }

    function goToCalendar() {
      if (!currentUser) return showToast("Sign in first", 'error');
      showStep(2);
    }

    function goToTimes() {
      if (!selectedDate) return showToast("Select date first", 'error');
      showStep(3);
    }

    function startNewBooking() {
      showStep(1);
      selectedServices = [];
      total = 0;
      selectedDate = "";
      selectedTime = "";
      document.getElementById("total").textContent = "0.00";
      document.querySelectorAll("#services input").forEach(cb => cb.checked = false);
      generateCalendar();
    }

    function showBooking() {
      document.getElementById("productsSection").classList.add("hidden");
      document.getElementById("bookingSection").classList.remove("hidden");
      document.querySelectorAll(".nav-btn").forEach(b => b.dataset.active = "false");
      document.querySelector(".nav-btn:first-child").dataset.active = "true";
    }

    function showProducts() {
      document.getElementById("bookingSection").classList.add("hidden");
      document.getElementById("productsSection").classList.remove("hidden");
      document.querySelectorAll(".nav-btn").forEach(b => b.dataset.active = "false");
      document.querySelector(".nav-btn:last-child").dataset.active = "true";
    }

    function toggleMode() {
      document.documentElement.classList.toggle("light");
      localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
    }

    // ──────────────────────────────────────────────────────────────────────────────
    // SAFE INITIALIZATION
    // ──────────────────────────────────────────────────────────────────────────────
    function init() {
      try {
        renderServices();
        generateCalendar();
        showBooking();

        // Load remembered email
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
          document.getElementById("loginEmail").value = rememberedEmail;
          document.getElementById("rememberMe").checked = true;
        }

        // Load theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
          document.documentElement.classList.add('light');
        }

        console.log("App fully initialized");
        showToast("Calendar & bookings loaded", 'success');
      } catch (err) {
        console.error("Init failed:", err);
        showToast("Some features failed to load – please refresh the page", 'error');
      }
    }

    // Run init on DOMContentLoaded for better reliability
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
